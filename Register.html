<!DOCTYPE html>
<html>
<head>
    <title>Register Page</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f4; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; }
        h2 { text-align: center; color: #333; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
        p { text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>Register</h2>
    <input type="email" id="regEmail" placeholder="Enter Email">
    <input type="password" id="regPassword" placeholder="Enter Password">
    <button onclick="registerUser()">Register</button>
    <p>Already have an account? <a href="login.html">Login here</a></p>
</div>

<script>
    function registerUser() {
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;

        fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, password: password })
        })
        .then(response => response.text())
        .then(data => {
            alert(data);
            if(data.includes("Successfully")) {
                window.location.href = 'login.html';
            }
        });
    }
</script>

</body>
</html>
